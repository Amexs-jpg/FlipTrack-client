<script type="text/babel">
const { useState, useMemo, useEffect, createContext, useContext } = React;

// ==================== CONTEXTE UTILISATEUR ====================
const AuthContext = createContext(null);

function useAuth() {
  const context = useContext(AuthContext);
  if (!context) throw new Error("useAuth must be used within AuthProvider");
  return context;
}

function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [guest, setGuest] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const savedUser = localStorage.getItem("fliptrack_user");
    if (savedUser) {
      try { setUser(JSON.parse(savedUser)); } catch(e) {}
    }
    setLoading(false);
  }, []);

  const login = (email, password) => {
    const users = JSON.parse(localStorage.getItem("fliptrack_users") || "[]");
    const found = users.find(u => u.email === email && u.password === password);
    if (found) {
      const userData = { email: found.email, premium: found.premium, id: found.id };
      setUser(userData);
      setGuest(false);
      localStorage.setItem("fliptrack_user", JSON.stringify(userData));
      return true;
    }
    return false;
  };

  const register = (email, password) => {
    const users = JSON.parse(localStorage.getItem("fliptrack_users") || "[]");
    if (users.find(u => u.email === email)) return false;
    const newUser = { id: Date.now(), email, password, premium: false };
    users.push(newUser);
    localStorage.setItem("fliptrack_users", JSON.stringify(users));
    const userData = { email: newUser.email, premium: false, id: newUser.id };
    setUser(userData);
    setGuest(false);
    localStorage.setItem("fliptrack_user", JSON.stringify(userData));
    return true;
  };

  const logout = () => {
    setUser(null);
    setGuest(false);
    localStorage.removeItem("fliptrack_user");
  };

  const enterGuest = () => { setGuest(true); };

  const upgradeToPremium = () => {
    if (user) {
      const updated = { ...user, premium: true };
      setUser(updated);
      localStorage.setItem("fliptrack_user", JSON.stringify(updated));
      const users = JSON.parse(localStorage.getItem("fliptrack_users") || "[]");
      const index = users.findIndex(u => u.id === user.id);
      if (index !== -1) { users[index].premium = true; localStorage.setItem("fliptrack_users", JSON.stringify(users)); }
    }
  };

  const value = { user, guest, loading, login, register, logout, enterGuest, upgradeToPremium };
  return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
}

// ==================== ÉCRAN DE CONNEXION ====================
function LoginScreen({ startAsGuest }) {
  const [isLogin, setIsLogin] = useState(true);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const { login, register, enterGuest } = useAuth();

  const handleSubmit = (e) => {
    e.preventDefault();
    setError("");
    if (!email || !password) return setError("Veuillez remplir tous les champs");
    if (isLogin) {
      const success = login(email, password);
      if (!success) setError("Email ou mot de passe incorrect");
    } else {
      const success = register(email, password);
      if (!success) setError("Cet email est déjà utilisé");
    }
  };

  return (
    <div style={{maxWidth:400,margin:"0 auto",padding:20,background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center"}}>
      <div style={{width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:32}}>

          <p style={{color:C.textSec,fontSize:14}}>{isLogin?"Connectez-vous à votre compte":"Créez un compte gratuitement"}</p>
        </div>
        <form onSubmit={handleSubmit}>
          <Field label="Email"><input style={inp} type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="exemple@email.com"/></Field>
          <Field label="Mot de passe"><input style={inp} type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••"/></Field>

          <span style={{fontSize:12,color:C.textTer}}>ou</span>

// ==================== PAGE DE PAIEMENT PREMIUM ====================
function PaymentScreen({ onClose, onSuccess }) {
  const [cardNumber, setCardNumber] = useState("");
  const [expiry, setExpiry] = useState("");
  const [cvc, setCvc] = useState("");
  const [name, setName] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [step, setStep] = useState("form"); // form | success

  const handlePayment = (e) => {
    e.preventDefault();
    setError("");
    if (!cardNumber || !expiry || !cvc || !name) return setError("Veuillez remplir tous les champs");
    if (!cardNumber.startsWith("4242")) {
      setError("Pour la démo, utilisez la carte 4242 4242 4242 4242");
      return;
    }
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      setStep("success");
      setTimeout(() => { onSuccess(); onClose(); }, 2000);
    }, 1800);
  };

  const formatCard = (value) => {
    const v = value.replace(/\s/g,'').slice(0,16);
    return v.replace(/(\d{4})(?=\d)/g,'$1 ');
  };

  const formatExpiry = (value) => {
    const v = value.replace(/\D/g,'').slice(0,4);
    return v.length >= 3 ? v.slice(0,2)+"/"+v.slice(2) : v;
  };

  // Détermine réseau carte
  const cardNet = cardNumber.startsWith("4") ? "VISA" : cardNumber.startsWith("5") ? "MC" : "•••";
  const displayNum = cardNumber ? formatCard(cardNumber) : "•••• •••• •••• ••••";
  const displayName = name || "VOTRE NOM";
  const displayExp = expiry || "MM/AA";

  if (step === "success") {
    return (
      <div style={{position:"fixed",inset:0,backgroundColor:"rgba(0,0,0,0.6)",backdropFilter:"blur(6px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>

    );

              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="#666" strokeWidth="1.5" strokeLinecap="round"/></svg>
            </button>
          </div>

          {/* Carte bancaire preview */}
          <div style={{
            background:"linear-gradient(135deg,#1a2030 0%,#2d3a55 50%,#1a2030 100%)",
            borderRadius:16,padding:"20px 22px",marginBottom:20,
            position:"relative",overflow:"hidden",
            boxShadow:"0 8px 32px rgba(0,0,0,0.2)",

          }}>
            {/* Cercles déco */}
            <div style={{position:"absolute",top:-20,right:-20,width:120,height:120,borderRadius:"50%",background:"rgba(239,159,39,0.15)"}}/>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
              {/* Chip */}
              <div style={{width:32,height:24,borderRadius:4,background:"linear-gradient(135deg,#d4af37,#b8962e)",opacity:0.9}}/>
              {/* Réseau */}
              <span style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.7)",letterSpacing:"0.05em"}}>{cardNet}</span>
            </div>

            <p style={{fontSize:15,fontWeight:500,color:"rgba(255,255,255,0.9)",letterSpacing:"0.18em",fontFamily:"'DM Mono',monospace",marginBottom:14}}>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>

                <p style={{fontSize:9,color:"rgba(255,255,255,0.4)",letterSpacing:"0.08em",marginBottom:2}}>TITULAIRE</p>
                <p style={{fontSize:12,fontWeight:500,color:"rgba(255,255,255,0.85)",letterSpacing:"0.05em",textTransform:"uppercase"}}>{displayName}</p>
              </div>
              <div style={{textAlign:"right"}}>
                <p style={{fontSize:9,color:"rgba(255,255,255,0.4)",letterSpacing:"0.08em",marginBottom:2}}>EXP</p>
                <p style={{fontSize:12,fontWeight:500,color:"rgba(255,255,255,0.85)",fontFamily:"'DM Mono',monospace"}}>{displayExp}</p>
              </div>
            </div>
          </div>

          {/* Prix */}
          <div style={{background:"linear-gradient(135deg,#FAEEDA,#fdf3e3)",border:"0.5px solid rgba(186,117,23,0.2)",borderRadius:12,padding:"14px 16px",marginBottom:20,display:"flex",alignItems:"center",gap:14}}>
            <div style={{flex:1}}>
              <p style={{fontSize:12,color:C.amberMid,marginBottom:2}}>FlipTrack Premium</p>
              <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                <span style={{fontSize:24,fontWeight:600,color:C.amber}}>2,99 €</span>
                <span style={{fontSize:12,color:C.amberLight}}>/mois</span>
              </div>

            <div style={{display:"flex",flexDirection:"column",gap:4}}>

                  <span style={{fontSize:11,color:C.amberMid}}>{f}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Formulaire carte */}
          <form onSubmit={handlePayment}>
            <Field label="Nom sur la carte">
              <input style={inp} placeholder="Jean Dupont" value={name} onChange={e=>setName(e.target.value.toUpperCase())}/>

            <Field label="Numéro de carte">
              <div style={{position:"relative"}}>
                <input style={{...inp,paddingRight:40}} placeholder="4242 4242 4242 4242" value={formatCard(cardNumber)} onChange={e=>setCardNumber(e.target.value.replace(/\s/g,''))}/>
                <div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:10,fontWeight:700,color:C.textTer}}>{cardNet}</div>
              </div>
            </Field>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Field label="Date d'expiration">
                <input style={inp} placeholder="MM/AA" value={expiry} onChange={e=>setExpiry(formatExpiry(e.target.value))} maxLength={5}/>
              </Field>
              <Field label="CVC">
                <div style={{position:"relative"}}>
                  <input style={{...inp,paddingRight:36}} placeholder="123" value={cvc} onChange={e=>setCvc(e.target.value.slice(0,4))} maxLength={4}/>
                  <div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)"}}>
                    <svg width="18" height="13" viewBox="0 0 18 13" fill="none"><rect x=".5" y=".5" width="17" height="12" rx="2" stroke="#ddd"/><rect x=".5" y="3.5" width="17" height="3" fill="#eee"/><rect x="11" y="7" width="4" height="2" rx="1" fill="#ddd"/></svg>
                  </div>
                </div>
              </Field>
            </div>

            {error && (
              <div style={{background:C.bgRed,border:"0.5px solid rgba(163,45,45,0.2)",borderRadius:8,padding:"10px 12px",marginBottom:12,display:"flex",gap:8,alignItems:"flex-start"}}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{marginTop:1,flexShrink:0}}><circle cx="7" cy="7" r="6" stroke={C.red} strokeWidth="1.2"/><path d="M7 4v3.5M7 9.5v.5" stroke={C.red} strokeWidth="1.3" strokeLinecap="round"/></svg>
                <p style={{fontSize:12,color:C.red,lineHeight:1.5}}>{error}</p>
              </div>
            )}

            <button type="submit" disabled={loading} style={{
              width:"100%",padding:"13px",border:"none",borderRadius:12,
              background:loading?"#999":"linear-gradient(135deg,#0F6E56,#085041)",
              color:"#fff",fontSize:14,fontWeight:600,cursor:loading?"not-allowed":"pointer",
              marginTop:8,letterSpacing:"0.01em",
              boxShadow:loading?"none":"0 4px 16px rgba(15,110,86,0.3)",
              transition:"all 0.2s"
            }}>
              {loading ? (
                <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{animation:"spin 0.8s linear infinite"}}><circle cx="8" cy="8" r="6" stroke="rgba(255,255,255,0.3)" strokeWidth="2"/><path d="M8 2a6 6 0 016 6" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>
                  Traitement en cours…
                </span>
              ) : "Payer 2,99 € / mois"}
            </button>
          </form>

          {/* Trust badges */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,marginTop:16}}>
            {[
              {icon:<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1L2 3.5v4c0 2.2 1.9 4.2 4.5 4.5C9.1 11.7 11 9.7 11 7.5v-4L6.5 1z" stroke="#999" strokeWidth="1.1" strokeLinejoin="round"/></svg>, text:"Sécurisé SSL"},
              {icon:<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="4" width="10" height="7.5" rx="1.5" stroke="#999" strokeWidth="1.1"/><path d="M4 4V3a2.5 2.5 0 015 0v1" stroke="#999" strokeWidth="1.1" strokeLinecap="round"/></svg>, text:"Crypté 256-bit"},
              {icon:<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1.5a5 5 0 100 10 5 5 0 000-10z" stroke="#999" strokeWidth="1.1"/><path d="M4.5 6.5l1.5 1.5 2.5-2.5" stroke="#999" strokeWidth="1.1" strokeLinecap="round" strokeLinejoin="round"/></svg>, text:"Annulable"},
            ].map(({icon,text}) => (
              <div key={text} style={{display:"flex",alignItems:"center",gap:4}}>
                {icon}
                <span style={{fontSize:10,color:C.textTer}}>{text}</span>
              </div>
            ))}
          </div>
          <p style={{fontSize:10,color:C.textTer,textAlign:"center",marginTop:8}}>Simulation — aucune vraie transaction. Carte test : 4242 4242 4242 4242</p>
        </div>
      </div>

      <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

// ==================== APPLICATION PRINCIPALE ====================
function FlipTrackApp() {
  const { user, guest, logout, upgradeToPremium } = useAuth();
  const [showPayment, setShowPayment] = useState(false);
  const [showLoginRequired, setShowLoginRequired] = useState(false);

  const DEMO_ITEMS = [
    { id:1,name:"iPhone 14 Pro",category:"Électronique",buyPrice:620,sellPrice:740,platform:"LeBonCoin",status:"vendu",date:"03/04/2025" },
    { id:2,name:"Nike Dunk Low",category:"Sneakers",buyPrice:110,sellPrice:null,platform:"Vinted",status:"stock",date:"05/04/2025" },
    { id:3,name:"PS5 + manette",category:"Jeux vidéo",buyPrice:380,sellPrice:430,platform:"LeBonCoin",status:"vendu",date:"01/04/2025" },
  ];

  const [items, setItems] = useState(() => {
    if (guest) return DEMO_ITEMS;
    const saved = localStorage.getItem(`fliptrack_items_${user?.id}`);
    return saved ? JSON.parse(saved) : [];
  });

  const [tab, setTab] = useState("dashboard");
  const [showAdd, setShowAdd] = useState(false);
  const [sellTarget, setSellTarget] = useState(null);
  const [sellPrice, setSellPrice] = useState("");
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [guideCat, setGuideCat] = useState("Électronique");
  const [siteFilter, setSiteFilter] = useState("Tous");
  const [form, setForm] = useState({name:"",category:"Électronique",buyPrice:"",platform:"LeBonCoin"});
  const [estForm, setEstForm] = useState({name:"",category:"Électronique",buyPrice:""});
  const [estResult, setEstResult] = useState(null);
  const [estLoading, setEstLoading] = useState(false);

  useEffect(() => {
    if (user && !guest) localStorage.setItem(`fliptrack_items_${user.id}`, JSON.stringify(items));
  }, [items, user, guest]);

  // Garde pour les actions nécessitant un compte
  const requireAccount = (fn) => {
    if (guest) { setShowLoginRequired(true); return; }
    fn();
  };

  const stats = useMemo(() => {
    const sold = items.filter(i => i.status==="vendu");
    const inStock = items.filter(i => i.status==="stock");
    return {
      profit: sold.reduce((a,i)=>{ const fee=FEES[i.platform]||0; const net=(i.sellPrice||0)*(1-fee/100); return a+(net-i.buyPrice); },0),
      revenue: sold.reduce((a,i)=>a+(i.sellPrice||0),0),
      invested: inStock.reduce((a,i)=>a+i.buyPrice,0),
      totalSpent: items.reduce((a,i)=>a+i.buyPrice,0),
      inStock: inStock.length,
      soldCount: sold.length,
    };
  }, [items]);

  function addItem() {
    if (!form.name||!form.buyPrice) return;
    const date = new Date().toLocaleDateString("fr-FR");
    setItems(p=>[...p,{id:Date.now(),name:form.name,category:form.category,buyPrice:parseFloat(form.buyPrice),sellPrice:null,platform:form.platform,status:"stock",date}]);
    setForm({name:"",category:"Électronique",buyPrice:"",platform:"LeBonCoin"});
    setShowAdd(false);
    setTab("stock");
  }

  function confirmSell() {
    const price = parseFloat(sellPrice);
    if (!price||!sellTarget) return;
    setItems(p=>p.map(i=>i.id===sellTarget?{...i,status:"vendu",sellPrice:price}:i));
    setSellTarget(null); setSellPrice("");
  }

  function deleteItem(id) { setItems(p=>p.filter(i=>i.id!==id)); setDeleteConfirm(null); }

  function findRealPriceRange(productName, category) {
    const lower = productName.toLowerCase();
    for (let e of REAL_PRICE_DB) {
      if (e.category===category && e.keywords.some(k=>lower.includes(k))) return {min:e.min,max:e.max,note:e.note,found:true};
    }
    for (let e of REAL_PRICE_DB) {
      if (e.keywords.some(k=>lower.includes(k))) return {min:e.min,max:e.max,note:e.note,found:true};
    }
    return {found:false};
  }

  function runEstimator() {
    if (!estForm.name.trim()||!estForm.buyPrice) return;
    const buy = parseFloat(estForm.buyPrice);
    if (isNaN(buy)||buy<=0) return;
    setEstLoading(true); setEstResult(null);
    setTimeout(()=>{
      const real = findRealPriceRange(estForm.name,estForm.category);
      let low,high,source;
      if (real.found){low=real.min;high=real.max;source=`prix réel (${real.note})`;}
      else{[low,high]=CATEGORY_FALLBACK[estForm.category];source=`moyenne catégorie ${estForm.category}`;}
      const feeRate=8;
      const netLow=low*(1-feeRate/100),netHigh=high*(1-feeRate/100);
      const profitLow=netLow-buy,profitHigh=netHigh-buy;
      let advice="";
      if(buy>high*1.5) advice="Achat anormalement cher, perte probable";
      else if(buy>high) advice="Prix d'achat supérieur au marché";
      else if(buy<low*0.7) advice="Excellente affaire";
      else advice="Prix cohérent";
      let risk=(buy>high)?"Risque élevé":(buy>low)?"Risque modéré":"Bonne opportunité";
      let recPlatform="LeBonCoin";
      if(estForm.category==="Vêtements") recPlatform="Vinted";
      else if(estForm.category==="Sneakers") recPlatform="StockX";
      else if(estForm.category==="Électronique") recPlatform="Back Market";
      else if(estForm.category==="Livres / BD") recPlatform="Momox";
      setEstResult({low,high,profitLow,profitHigh,risk,recommendedPlatform:recPlatform,feeRate,advice,source});
      setEstLoading(false);
    },800);
  }

  const SITES = [
    {name:"LeBonCoin",url:"https://www.leboncoin.fr",fee:0,color:"#F05C00",desc:"Généraliste français n°1. 0% de frais.",cats:["Électronique","Jeux vidéo","Sport","Livres / BD","Autre"],tip:"Publiez le matin."},

    "Jeux vidéo":[{n:"LeBonCoin",f:0,best:true,t:"0% frais."},{n:"Vinted",f:0,best:false,t:"Jeux récents."},{n:"eBay",f:8,best:false,t:"Raretés."}],
    "Sacs":[{n:"Vinted",f:0,best:true,t:"Marques courantes."},{n:"Vestiaire Collective",f:12,best:false,t:"Luxe."},{n:"LeBonCoin",f:0,best:false,t:"Local."}],

    "Sport":[{n:"LeBonCoin",f:0,best:true,t:"Matériel sportif."},{n:"Vinted",f:0,best:false,t:"Vêtements sport."},{n:"eBay",f:8,best:false,t:"Niche."}],

  const tabs = [

    {id:"estimateur",label:"Estimer",icon:<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" strokeWidth="1.3" fill="none"/><path d="M8 5v3l2 1.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>},

  ];

  const siteCats = ["Tous",...CATEGORIES];
  const filteredSites = siteFilter==="Tous" ? SITES : SITES.filter(s=>s.cats.includes(siteFilter));

  return (
    <div style={{maxWidth:520,margin:"0 auto",background:C.bg,minHeight:"100vh",position:"relative",paddingBottom:guest?80:80}}>

        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          {guest ? (

          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke={C.amberMid} strokeWidth="1.2"/><path d="M7 4.5v3M7 9.5v.5" stroke={C.amberMid} strokeWidth="1.3" strokeLinecap="round"/></svg>

                  <div key={n} style={{display:"flex",gap:12,marginBottom:12}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:C.bgAmber,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:500,color:C.amber}}>{n}</div>
                    <div><p style={{fontSize:13,fontWeight:500,marginBottom:2}}>{title}</p><p style={{fontSize:12,color:C.textSec}}>{desc}</p></div>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <>
              {guest && <div style={{background:C.bgAmber,borderRadius:8,padding:"8px 12px",marginTop:16,marginBottom:0,fontSize:12,color:C.amberMid}}>Ces données sont fictives à titre de démonstration.</div>}
              <Label>Tes gains nets</Label>
              <div style={{display:"grid",gap:10}}>
                <div style={{background:C.bgAmber,borderRadius:12,padding:"16px 18px"}}>
                  <p style={{fontSize:12,fontWeight:500,color:C.amberMid}}>Profit net total</p>
                  <p style={{fontSize:28,fontWeight:500,color:stats.profit>=0?C.greenLight:C.red}}>{eur(stats.profit)}</p>
                  <p style={{fontSize:12,color:C.amberLight}}>{stats.soldCount} vente(s)</p>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div style={{background:C.bgSec,borderRadius:8,padding:"14px 16px"}}><p style={{fontSize:12,color:C.textSec}}>CA</p><p style={{fontSize:19,fontWeight:500}}>{eur(stats.revenue)}</p></div>
                  <div style={{background:C.bgSec,borderRadius:8,padding:"14px 16px"}}><p style={{fontSize:12,color:C.textSec}}>Dépensé</p><p style={{fontSize:19,fontWeight:500}}>{eur(stats.totalSpent)}</p></div>
                </div>
              </div>
              <Label>Capital investi</Label>
              <div style={{background:C.bg,border:"0.5px solid "+C.border,borderRadius:12,padding:"14px 18px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div><p style={{fontSize:13,fontWeight:500}}>Argent bloqué en stock</p><p style={{fontSize:12,color:C.textSec}}>{stats.inStock} article(s)</p></div>
                  <div style={{textAlign:"right"}}><p style={{fontSize:22,fontWeight:500,color:C.amber}}>{eur(stats.invested)}</p><p style={{fontSize:11,color:C.amberLight}}>à récupérer</p></div>
                </div>
                <Btn full onClick={()=>setTab("stock")}>Voir le stock →</Btn>
              </div>
            </>
          )
        )}

        {tab==="stock" && (
          <>
            <Label action={<Btn onClick={()=>requireAccount(()=>setShowAdd(!showAdd))}>{showAdd?"Annuler":"+ Ajouter un achat"}</Btn>}>{items.length} article(s){guest?" (démo)":""}</Label>
            {showAdd && (
              <div style={{background:C.bgSec,borderRadius:12,padding:16,marginBottom:12}}>
                <p style={{fontSize:14,fontWeight:500,marginBottom:4}}>Nouvel article</p>
                <Field label="Nom"><input style={inp} placeholder="Ex: iPhone 14" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></Field>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <Field label="Catégorie"><select style={sel} value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></Field>
                  <Field label="Plateforme"><select style={sel} value={form.platform} onChange={e=>setForm({...form,platform:e.target.value})}>{PLATFORMS_LIST.map(p=><option key={p}>{p}</option>)}</select></Field>
                </div>
                <Field label="Prix d'achat (€)"><input style={inp} type="number" placeholder="120" value={form.buyPrice} onChange={e=>setForm({...form,buyPrice:e.target.value})}/></Field>
                <Btn full onClick={addItem}>Enregistrer</Btn>
              </div>
            )}
            {sellTarget && (
              <div style={{background:C.bg,border:"1.5px solid #0F6E56",borderRadius:12,padding:16,marginBottom:12}}>
                <p style={{fontWeight:500}}>Vendre "{items.find(i=>i.id===sellTarget)?.name}"</p>
                <p style={{fontSize:13,color:C.textSec,marginBottom:12}}>Acheté {eur(items.find(i=>i.id===sellTarget)?.buyPrice)}</p>
                <div style={{display:"flex",gap:8}}>
                  <input style={{...inp,flex:1}} type="number" placeholder="Prix de vente" value={sellPrice} onChange={e=>setSellPrice(e.target.value)} autoFocus/>
                  <Btn onClick={confirmSell}>Confirmer</Btn>
                  <Btn onClick={()=>{setSellTarget(null);setSellPrice("");}}>✕</Btn>
                </div>
              </div>
            )}
            {deleteConfirm && (
              <div style={{background:C.bgRed,border:"1.5px solid "+C.red,borderRadius:12,padding:16,marginBottom:12}}>
                <p style={{fontWeight:500,color:C.red}}>Supprimer ?</p>
                <p style={{fontSize:13,marginBottom:12}}>Action irréversible.</p>
                <div style={{display:"flex",gap:8}}><Btn danger full onClick={()=>deleteItem(deleteConfirm)}>Oui</Btn><Btn onClick={()=>setDeleteConfirm(null)}>Non</Btn></div>
              </div>
            )}
            {items.length===0 && !showAdd && <EmptyState title="Aucun article" desc='Cliquez sur "+ Ajouter un achat"' onAction={()=>requireAccount(()=>setShowAdd(true))} actionLabel="+ Ajouter un achat"/>}
            {[...items].reverse().map(item=>{
              const fee=FEES[item.platform]||0;
              const netSell=item.sellPrice?item.sellPrice*(1-fee/100):null;
              const profit=netSell?netSell-item.buyPrice:null;
              return (
                <div key={item.id} style={{background:C.bg,border:"0.5px solid "+C.border,borderRadius:12,padding:"14px 16px",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                    <div style={{width:36,height:36,borderRadius:8,background:C.bgSec,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="1.5" width="13" height="13" rx="2" stroke="#aaa"/><path d="M4.5 8h7M8 4.5v7" stroke="#aaa"/></svg></div>
                    <div style={{flex:1}}><p style={{fontWeight:500}}>{item.name}</p><div style={{fontSize:12,color:C.textSec}}>{item.category} · {item.platform} · {item.date}</div></div>
                    <div>
                      <Badge variant={item.status}>{item.status==="vendu"?"vendu":"stock"}</Badge>
                      {!guest && <button onClick={()=>requireAccount(()=>setDeleteConfirm(item.id))} style={{marginLeft:8,width:28,height:28,borderRadius:6,border:"0.5px solid "+C.border,background:"transparent",cursor:"pointer"}}><svg width="13" height="13" viewBox="0 0 13 13"><path d="M2 3.5h9M5 3.5V2.5a.5.5 0 01.5-.5h2a.5.5 0 01.5.5v1M5.5 6v3.5M7.5 6v3.5M3 3.5l.5 7a.5.5 0 00.5.5h5a.5.5 0 00.5-.5l.5-7" stroke="#999"/></svg></button>}
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",marginTop:12,paddingTop:10,borderTop:"0.5px solid "+C.border,gap:8,flexWrap:"wrap"}}>
                    <span style={{fontSize:13,color:C.textSec}}>Acheté <strong>{eur(item.buyPrice)}</strong>{item.sellPrice && <> → Vendu <strong>{eur(item.sellPrice)}</strong></>}</span>
                    {profit!=null && <span style={{fontSize:14,fontWeight:500,color:profit>=0?C.green:C.red}}>Gain: {profit>=0?"+":""}{eur(profit)}</span>}
                    {item.status==="stock" && <Btn small onClick={()=>requireAccount(()=>{setSellTarget(item.id);setSellPrice("");})}>{guest?"Voir →":"Vendre"}</Btn>}
                  </div>
                </div>
              );
            })}
          </>
        )}

        {tab==="estimateur" && (
          <>
            <Label>Analyse — estimation fiable</Label>
            <div style={{background:C.bgSec,borderRadius:12,padding:16}}>
              <p style={{fontSize:13,color:C.textSec,marginBottom:14}}>Saisissez n'importe quel produit, une estimation sera toujours fournie.</p>
              <Field label="Produit"><input style={inp} placeholder="Ex: iPhone 15, Nike Dunk..." value={estForm.name} onChange={e=>setEstForm({...estForm,name:e.target.value})}/></Field>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <Field label="Catégorie"><select style={sel} value={estForm.category} onChange={e=>setEstForm({...estForm,category:e.target.value})}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></Field>
                <Field label="Prix acheté (€)"><input style={inp} type="number" placeholder="800" value={estForm.buyPrice} onChange={e=>setEstForm({...estForm,buyPrice:e.target.value})}/></Field>
              </div>
              <Btn full onClick={runEstimator} disabled={estLoading||!estForm.name||!estForm.buyPrice}>{estLoading?"Analyse...":"Estimer →"}</Btn>
            </div>
            {estResult && (
              <div className="animate-fade" style={{marginTop:16,background:C.bgGreen,borderRadius:12,padding:18}}>
                <p style={{fontSize:12,fontWeight:500,color:C.green}}>Prix de revente constaté</p>
                <p style={{fontSize:26,fontWeight:500,color:C.greenDark}}>{eur(estResult.low)} – {eur(estResult.high)}</p>
                <p style={{fontSize:12,color:C.green}}>Source : {estResult.source}</p>
                <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div style={{background:"#fff",borderRadius:8,padding:12}}><p style={{fontSize:12,color:C.textSec}}>Bénéfice net</p><p style={{fontSize:18,fontWeight:500}}>{eur(estResult.profitLow)} à {eur(estResult.profitHigh)}</p></div>
                  <div style={{background:"#fff",borderRadius:8,padding:12}}><p style={{fontSize:12,color:C.amberMid}}>Risque</p><p style={{fontSize:14,fontWeight:500}}>{estResult.risk}</p></div>
                </div>
                <p style={{fontSize:13,marginTop:12}}>{estResult.advice}</p>
                <p style={{fontSize:12,fontWeight:500,marginTop:8,color:C.greenDark}}>Plateforme recommandée : {estResult.recommendedPlatform}</p>
              </div>
            )}
          </>
        )}

        {tab==="plateformes" && (
          <>
            <Label>Sites de revente</Label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
              {siteCats.map(cat=><button key={cat} onClick={()=>setSiteFilter(cat)} style={{fontSize:12,padding:"5px 12px",borderRadius:20,border:siteFilter===cat?"1.5px solid #0F6E56":"0.5px solid "+C.border,background:siteFilter===cat?C.bgGreen:"transparent",color:siteFilter===cat?C.greenDark:C.textSec,cursor:"pointer"}}>{cat}</button>)}
            </div>
            {filteredSites.map(site=>(
              <div key={site.name} style={{background:C.bg,border:"0.5px solid "+C.border,borderRadius:12,overflow:"hidden",marginBottom:12}}>
                <div style={{height:4,background:site.color}}/>
                <div style={{padding:"14px 16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                    <div style={{width:36,height:36,borderRadius:8,background:site.color,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="#fff"/><path d="M8 2.5C6.3 2.5 5 5 5 8s1.3 5.5 3 5.5S11 11 11 8s-1.3-5.5-3-5.5z" stroke="#fff"/><path d="M2.5 8h11" stroke="#fff"/></svg></div>
                    <div style={{flex:1}}><p style={{fontSize:15,fontWeight:500}}>{site.name}</p><span style={{fontSize:12,fontWeight:500,color:site.fee===0?C.green:C.amberMid}}>{site.fee===0?"Gratuit":`${site.fee}% de frais`}</span></div>
                    <a href={site.url} target="_blank" rel="noopener noreferrer" style={{fontSize:12,padding:"6px 14px",borderRadius:8,border:"0.5px solid "+C.borderMed,background:"transparent",color:C.textPri,textDecoration:"none"}}>Ouvrir →</a>
                  </div>
                  <p style={{fontSize:13,color:C.textSec,marginBottom:10}}>{site.desc}</p>
                  <div style={{background:C.bgAmber,borderRadius:8,padding:"8px 12px",display:"flex",gap:8}}>
                    <span>💡</span><p style={{fontSize:12,color:C.amberMid}}>{site.tip}</p>
                  </div>
                </div>
              </div>
            ))}
          </>
        )}

        {tab==="guide" && (
          <>
            <Label>Où vendre selon la catégorie</Label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
              {CATEGORIES.map(cat=><button key={cat} onClick={()=>setGuideCat(cat)} style={{fontSize:12,padding:"5px 12px",borderRadius:20,border:guideCat===cat?"1.5px solid #0F6E56":"0.5px solid "+C.border,background:guideCat===cat?C.bgGreen:"transparent",color:guideCat===cat?C.greenDark:C.textSec,cursor:"pointer"}}>{cat}</button>)}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
              {(GUIDE[guideCat]||[]).map(p=>(
                <div key={p.n} style={{background:C.bg,border:p.best?"1.5px solid #1D9E75":"0.5px solid "+C.border,borderRadius:12,padding:"14px 16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>{p.best && <Badge variant="vendu">meilleur choix</Badge>}<span style={{fontWeight:500}}>{p.n}</span><span style={{marginLeft:"auto",fontSize:13,fontWeight:500,color:p.f===0?C.green:C.amberMid}}>{p.f===0?"Gratuit":`${p.f}% de frais`}</span></div>
                  <p style={{fontSize:13,color:C.textSec}}>{p.t}</p>
                </div>
              ))}
            </div>
            <Label>Frais par plateforme</Label>
            <div style={{background:C.bgSec,borderRadius:12,padding:"4px 16px"}}>
              {Object.entries(FEES).map(([name,fee],i,arr)=>(
                <div key={name} style={{display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:i<arr.length-1?"0.5px solid "+C.border:"none"}}><span>{name}</span><span style={{fontWeight:500,color:fee===0?C.green:C.textSec}}>{fee===0?"Gratuit":`${fee}% prélevé`}</span></div>
              ))}
            </div>
          </>
        )}
      </div>

      {/* BANNIÈRE PUB MODERNE */}
      {!user?.premium && (
        <div className="ad-banner">
          <div className="ad-banner-inner">
            <div className="ad-dot"/>
            <p className="ad-text"><strong>FlipTrack Free</strong> — vous regardez des publicités pour financer l'app</p>
            <button className="ad-cta" onClick={()=>requireAccount(()=>setShowPayment(true))}>
              Premium · 2,99€
            </button>
          </div>
        </div>
      )}

      {/* Modales */}
      {showLoginRequired && (
        <LoginRequiredModal
          onClose={()=>setShowLoginRequired(false)}
          onGoLogin={()=>{ setShowLoginRequired(false); logout(); }}
        />
      )}
      {showPayment && <PaymentScreen onClose={()=>setShowPayment(false)} onSuccess={upgradeToPremium}/>}
    </div>
  );
}

// ==================== ROUTEUR PRINCIPAL ====================
function App() {
  const { user, guest, loading } = useAuth();
  if (loading) return <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",fontSize:14,color:"#999"}}>Chargement…</div>;
  return (user || guest) ? <FlipTrackApp/> : <LoginScreen/>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AuthProvider><App/></AuthProvider>);
</script>
</body>
</html>
